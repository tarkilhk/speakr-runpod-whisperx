---
name: Build Docker images

"on":
  push:
    branches:
      - main
    paths:
      - 'adapter/**'
      - 'runpod-image/**'
      - '.github/workflows/build-images.yaml'
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

concurrency:
  group: build-whisperx-images
  cancel-in-progress: true

env:
  ADAPTER_IMAGE: tarkilhk/speakr-whisperx-adapter
  RUNPOD_IMAGE: tarkilhk/speakr-whisperx-runpod

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tarkilhk
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push adapter image
        uses: docker/build-push-action@v6
        with:
          context: adapter
          pull: true
          push: true
          tags: |
            ${{ env.ADAPTER_IMAGE }}:latest
            ${{ env.ADAPTER_IMAGE }}:sha-${{ steps.image.outputs.short_sha }}

      - name: Build and push RunPod image
        uses: docker/build-push-action@v6
        with:
          context: runpod-image
          pull: true
          push: true
          tags: |
            ${{ env.RUNPOD_IMAGE }}:latest
            ${{ env.RUNPOD_IMAGE }}:sha-${{ steps.image.outputs.short_sha }}
