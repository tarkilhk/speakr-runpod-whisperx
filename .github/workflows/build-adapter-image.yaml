---
name: Build adapter image

"on":
  push:
    branches:
      - main
    paths:
      - 'adapter/**'
      - 'scripts/**'
      - 'docker-compose.mock.yml'
      - '.github/workflows/build-adapter-image.yaml'
  workflow_dispatch:

concurrency:
  group: build-speakr-adapter-image
  cancel-in-progress: true

env:
  ADAPTER_IMAGE: tarkilhk/speakr-adapter

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start mock services
        run: docker compose -f docker-compose.mock.yml up -d --build

      - name: Wait for adapter to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:19000/health; then
              echo "Adapter is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          docker compose -f docker-compose.mock.yml logs
          exit 1

      - name: Run smoke test
        run: bash scripts/smoke_mock_adapter.sh

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.mock.yml down

  build-adapter-image:
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tarkilhk
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push adapter image
        uses: docker/build-push-action@v6
        with:
          context: adapter
          pull: true
          push: true
          tags: |
            ${{ env.ADAPTER_IMAGE }}:latest
            ${{ env.ADAPTER_IMAGE }}:sha-${{ steps.image.outputs.short_sha }}
