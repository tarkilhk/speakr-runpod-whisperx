---
name: Build adapter image

"on":
  push:
    branches:
      - main
    paths:
      - 'adapter/**'
      - '.github/workflows/build-adapter-image.yaml'
  workflow_dispatch:

concurrency:
  group: build-speaker-adapter-image
  cancel-in-progress: true

env:
  ADAPTER_IMAGE: tarkilhk/speaker-adapter

jobs:
  build-adapter-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tarkilhk
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push adapter image
        uses: docker/build-push-action@v6
        with:
          context: adapter
          pull: true
          push: true
          tags: |
            ${{ env.ADAPTER_IMAGE }}:latest
            ${{ env.ADAPTER_IMAGE }}:sha-${{ steps.image.outputs.short_sha }}
