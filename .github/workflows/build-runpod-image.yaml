---
name: Build RunPod image

"on":
  push:
    branches:
      - main
    paths:
      - 'runpod-image/**'
      - 'speakr_common/**'
      - '.github/workflows/build-runpod-image.yaml'
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

concurrency:
  group: build-speakr-runpod-whisperx-image
  cancel-in-progress: true

env:
  RUNPOD_IMAGE: tarkilhk/speakr-runpod-whisperx

jobs:
  build-runpod-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tags
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tarkilhk
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push RunPod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod-image/Dockerfile
          pull: true
          push: true
          tags: |
            ${{ env.RUNPOD_IMAGE }}:latest
            ${{ env.RUNPOD_IMAGE }}:sha-${{ steps.image.outputs.short_sha }}
