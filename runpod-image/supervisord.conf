[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:whisperx]
directory=/workspace
command=python3 -m uvicorn app.main:app --host 127.0.0.1 --port 9001
autorestart=true
startsecs=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:wrapper]
directory=/opt/whisperx-wrapper
command=python3 -m uvicorn wrapper:app --host 0.0.0.0 --port 9000
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

